<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temp Tracker</title>
    <link rel="stylesheet" href="./estilos.css">
</head>
<body>
    <div class="contenedor">
        <div class="buscador">
            <input
                type="text"
                placeholder="Ingrese el nombre de la ciudad"
                spellcheck="false"
                autocomplete="false"
                id="input-ciudad"
            />
            <button onclick="buscarClima()">
                <img src="imagenes/buscar.png" alt="Buscar">
            </button>
        </div>

        <div class="clima-info" id="clima-contenedor">
            <p class="clima-texto">Parcialmente Nublado</p>
            <img src="imagenes/clima-ejemplo.webp" class="clima-icono" alt="Clima">
            <h1 class="temp">22°C</h1>
            <h2 class="ciudad">Huancayo</h2>
            
            <div class="detalles">
                <div class="col">
                    <img src="imagenes/Humedad.png" alt="Humedad">
                    <div>
                        <p class="humedad">50%</p>
                        <p>Humedad</p>
                    </div>
                </div>
                <div class="col">
                    <img src="imagenes/viento.png"> 
                    <div>
                        <p class="viento">15 km/h</p>
                        <p>Viento</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="creditos">
            <p><strong>Miguel Isac Cutipa Hancco</strong></p>
            <p>Curso: Introducción a la Ingeniería de Sistemas | Universidad Continental</p>
        </div>
        
    </div>

    <script src="./codigo.js"></script>  
</body>
</html>
